<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login — AttendIQ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f172a; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        .card { 
            background: #1e293b; 
            border-radius: 16px; 
            padding: 40px; 
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4); 
            border: 1px solid #334155;
        }
        
        .logo { text-align: center; margin-bottom: 24px; }
        .logo h1 { color: #38bdf8; font-size: 1.8rem; }
        .logo p  { color: #94a3b8; font-size: 0.9rem; margin-top: 6px; }
        
        label { 
            color: #cbd5e1; 
            font-size: 0.85rem; 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600;
        }
        
        input { 
            width: 100%; 
            padding: 12px 14px; 
            background: #0f172a; 
            border: 1px solid #334155;
            border-radius: 8px; 
            color: #f1f5f9; 
            font-size: 0.95rem; 
            margin-bottom: 20px; 
            outline: none; 
            transition: border-color 0.2s;
        }
        input:focus { border-color: #38bdf8; }
        
        button { 
            width: 100%; 
            padding: 13px; 
            background: #38bdf8; 
            color: #0f172a;
            border: none; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 700;
            cursor: pointer; 
            transition: background 0.2s; 
        }
        button:hover { background: #0ea5e9; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        
        .error-msg { 
            text-align: center; 
            margin-top: 14px; 
            font-size: 0.9rem; 
            color: #f87171; 
            min-height: 20px;
        }
        
        .back-link { 
            text-align: center; 
            margin-top: 20px; 
            padding-top: 20px;
            border-top: 1px solid #334155;
        }
        .back-link a { color: #38bdf8; text-decoration: none; font-size: 0.9rem; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🎓 Student Portal</h1>
        <p>Login to view your attendance records</p>
    </div>
    
    <label for="roll_no">Roll Number</label>
    <input type="text" id="roll_no" placeholder="e.g. CS2024001" autocomplete="off">
    
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password">
    
    <button id="loginBtn" onclick="doLogin()">Login</button>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <div class="back-link">
        <a href="/">← Back to Home</a>
    </div>
</div>

<script>
async function doLogin() {
    const roll_no  = document.getElementById('roll_no').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('loginBtn');
    const msgEl    = document.getElementById('errorMsg');
    
    // Basic validation
    if (!roll_no || !password) {
        msgEl.textContent = 'Please enter both Roll No and Password.';
        return;
    }
    
    // Show loading state
    btn.disabled     = true;
    btn.textContent  = 'Logging in...';
    msgEl.textContent = '';
    
    try {
        const res  = await fetch('/api/student-login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ roll_no, password })
        });
        const data = await res.json();
        
        if (data.success) {
            // Redirect to dashboard on success
            window.location.href = '/student-dashboard';
        } else {
            msgEl.textContent = data.message;
            btn.disabled      = false;
            btn.textContent   = 'Login';
        }
    } catch (err) {
        msgEl.textContent = 'Connection error. Please try again.';
        btn.disabled      = false;
        btn.textContent   = 'Login';
    }
}

// Allow pressing Enter to submit
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
