<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance — AttendIQ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f172a; 
            color: #f1f5f9; 
            min-height: 100vh; 
        }
        
        /* ── Header ── */
        header { 
            background: #1e293b; 
            padding: 16px 32px; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid #334155; 
        }
        header h1 { color: #38bdf8; font-size: 1.3rem; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .student-info { color: #94a3b8; font-size: 0.9rem; }
        .student-info strong { color: #f1f5f9; }
        a.logout-btn { 
            color: #f87171; 
            text-decoration: none; 
            font-size: 0.85rem;
            border: 1px solid #f87171;
            padding: 5px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        a.logout-btn:hover { background: #f87171; color: #0f172a; }
        
        /* ── Main Content ── */
        .container { max-width: 960px; margin: 32px auto; padding: 0 20px; }
        
        /* ── Stats Cards ── */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 16px; 
            margin-bottom: 32px; 
        }
        .stat-card { 
            background: #1e293b; 
            border-radius: 12px; 
            padding: 22px 16px; 
            text-align: center;
            border: 1px solid #334155; 
        }
        .stat-val  { font-size: 2.2rem; font-weight: 700; line-height: 1; }
        .stat-lbl  { color: #94a3b8; font-size: 0.8rem; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .blue   { color: #38bdf8; }
        .green  { color: #4ade80; }
        .red    { color: #f87171; }
        .yellow { color: #fbbf24; }
        
        /* ── Progress Bar ── */
        .progress-wrap { margin-top: 10px; }
        .progress-bar  { background: #334155; border-radius: 50px; height: 8px; }
        .progress-fill { 
            height: 8px; 
            border-radius: 50px; 
            background: linear-gradient(90deg, #38bdf8, #4ade80);
            transition: width 0.8s ease; 
        }
        .progress-label { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.75rem; 
            color: #64748b; 
            margin-top: 4px; 
        }
        
        /* ── Attendance Status Banner ── */
        .status-banner {
            padding: 14px 20px;
            border-radius: 10px;
            margin-bottom: 28px;
            font-size: 0.95rem;
            font-weight: 600;
            display: none;
        }
        .banner-good    { background: #14532d; color: #4ade80; border: 1px solid #166534; }
        .banner-warning { background: #451a03; color: #fbbf24; border: 1px solid #78350f; }
        .banner-danger  { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
        
        /* ── Table ── */
        .section-title { 
            color: #cbd5e1; 
            font-size: 1rem; 
            margin-bottom: 14px; 
            font-weight: 600;
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: #1e293b;
            border-radius: 12px; 
            overflow: hidden;
            border: 1px solid #334155;
        }
        thead tr { background: #0f172a; }
        th { 
            padding: 13px 16px; 
            text-align: left; 
            font-size: 0.78rem; 
            color: #64748b; 
            text-transform: uppercase; 
            letter-spacing: 0.06em;
            font-weight: 600;
        }
        td { 
            padding: 13px 16px; 
            border-bottom: 1px solid #0f172a; 
            font-size: 0.9rem; 
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #243047; }
        
        .badge { 
            padding: 3px 10px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: 700; 
        }
        .badge-present { background: #14532d; color: #4ade80; }
        .badge-absent  { background: #450a0a; color: #f87171; }
        
        /* ── Mini bar in table ── */
        .mini-bar { background: #334155; border-radius: 50px; height: 5px; width: 80px; margin-top: 4px; }
        .mini-fill { height: 5px; border-radius: 50px; background: #38bdf8; }
        
        .empty-state { 
            text-align: center; 
            padding: 48px; 
            color: #64748b; 
            font-size: 0.95rem; 
        }
        
        .loading { text-align: center; padding: 48px; color: #64748b; }
    </style>
</head>
<body>

<header>
    <h1>🎓 AttendIQ — My Attendance</h1>
    <div class="header-right">
        <div class="student-info">
            <strong>{{ student_name }}</strong> &nbsp;|&nbsp; {{ student_roll }}
        </div>
        <a class="logout-btn" href="/student-logout">Logout</a>
    </div>
</header>

<div class="container">

    <!-- Summary Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-val blue"  id="statTotal">—</div>
            <div class="stat-lbl">Total Sessions</div>
        </div>
        <div class="stat-card">
            <div class="stat-val green" id="statPresent">—</div>
            <div class="stat-lbl">Present</div>
        </div>
        <div class="stat-card">
            <div class="stat-val red"   id="statAbsent">—</div>
            <div class="stat-lbl">Absent</div>
        </div>
        <div class="stat-card">
            <div class="stat-val yellow" id="statPct">—</div>
            <div class="stat-lbl">Overall Attendance</div>
            <div class="progress-wrap">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width:0%"></div>
                </div>
                <div class="progress-label">
                    <span>0%</span><span>75% required</span><span>100%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Banner (shows warning if attendance is low) -->
    <div class="status-banner" id="statusBanner"></div>

    <!-- Attendance Records Table -->
    <div class="section-title">📋 Session-wise Attendance Records</div>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Subject</th>
                <th>Teacher</th>
                <th>Detections</th>
                <th>Percentage</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" class="loading">Loading your records...</td></tr>
        </tbody>
    </table>

</div>

<script>
async function loadAttendance() {
    try {
        const res  = await fetch('/api/student-attendance');
        const data = await res.json();
        
        if (data.error) {
            document.getElementById('tableBody').innerHTML = 
                `<tr><td colspan="6" class="empty-state">Error: ${data.error}</td></tr>`;
            return;
        }

        // ── Fill in stats ──
        document.getElementById('statTotal').textContent   = data.total_sessions;
        document.getElementById('statPresent').textContent = data.present_count;
        document.getElementById('statAbsent').textContent  = data.absent_count;
        document.getElementById('statPct').textContent     = data.overall_percentage + '%';
        document.getElementById('progressBar').style.width = data.overall_percentage + '%';

        // ── Show attendance warning banner ──
        const pct    = data.overall_percentage;
        const banner = document.getElementById('statusBanner');
        if (data.total_sessions > 0) {
            banner.style.display = 'block';
            if (pct >= 75) {
                banner.className   = 'status-banner banner-good';
                banner.textContent = `✅ Great! Your attendance is ${pct}% — you meet the 75% requirement.`;
            } else if (pct >= 60) {
                banner.className   = 'status-banner banner-warning';
                banner.textContent = `⚠️ Warning: Your attendance is ${pct}%. You need 75% to meet requirements. Attend more classes!`;
            } else {
                banner.className   = 'status-banner banner-danger';
                banner.textContent = `🚨 Critical: Your attendance is only ${pct}%. Immediate improvement needed to meet the 75% requirement.`;
            }
        }

        // ── Fill in table rows ──
        const tbody = document.getElementById('tableBody');
        
        if (!data.records || data.records.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No attendance records found yet.</td></tr>';
            return;
        }

        tbody.innerHTML = data.records.map(r => {
            const barWidth = Math.min(r.percentage, 100);
            return `
                <tr>
                    <td>${r.session_date || '—'}</td>
                    <td>${r.subject || '—'}</td>
                    <td>${r.teacher_name || '—'}</td>
                    <td>
                        ${r.detected_count} / ${r.total_checks}
                        <div class="mini-bar">
                            <div class="mini-fill" style="width:${barWidth}%"></div>
                        </div>
                    </td>
                    <td>${r.percentage}%</td>
                    <td>
                        <span class="badge ${r.status === 'PRESENT' ? 'badge-present' : 'badge-absent'}">
                            ${r.status}
                        </span>
                    </td>
                </tr>
            `;
        }).join('');

    } catch (err) {
        document.getElementById('tableBody').innerHTML = 
            `<tr><td colspan="6" class="empty-state">Failed to load data. Please refresh the page.</td></tr>`;
    }
}

// Load data when page opens
loadAttendance();
</script>

</body>
</html>
